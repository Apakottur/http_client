type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Scratch Pad
collection:
  - url: http://localhost:12000/user/register_phone
    name: Reg Phone
    meta: { sortKey: 3800 }
    method: POST
    body:
      mimeType: application/json
      text: '{"a":1}'
    headers:
      - name: x-api-key
        value: FAKEKEY
    authentication:
      type: bearer
      token: FAKE_TOKEN
  - url: http://localhost:12000/login
    name: Login
    meta: { sortKey: 3900 }
    method: POST
    body:
      mimeType: application/x-www-form-urlencoded
      params:
        - name: user
          value: admin
        - name: pass
          value: secret
    authentication:
      type: basic
      username: admin
      password: pw
  - url: http://localhost:12000/upload
    name: Upload
    meta: { sortKey: 4000 }
    method: POST
    parameters:
      - name: q
        value: "1"
    body:
      mimeType: multipart/form-data
      params:
        - name: note
          value: hi
          type: text
        - name: file
          value: /tmp/a.csv
          type: file
        - name: skipme
          value: x
          type: text
          disabled: true
  - url: http://localhost:12000/ping
    name: Ping
    meta: { sortKey: 4100 }
    method: GET
  - name: A Folder Group No URL
    meta: { sortKey: 1 }
